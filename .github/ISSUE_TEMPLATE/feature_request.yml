name: Feature request
description: Suggest a new helper, repository method, or behavior.
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        The library is intentionally minimal — the bar for adding surface area is high. Please read [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) before filing.

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to do? Why does the current API not let you do it?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: Sketch the method signature or behavior you'd like to see.
      render: php

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: This change does not require modifying the upstream signature scheme.
          required: false
